<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title or 'Grace Li · 瀛动教育 | 留学规划与申请' }}</title>
  <meta name='description' content='Grace Li · 瀛动教育，专注美本/美研/低龄留学规划，提供申请服务、留学地图、案例库与一对一咨询。'>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
</head>
<body>
<nav class="site-navbar sticky-top">
  <div class="container nav-wrap">
    <a class="brand" href="{{ url_for('home') }}">
      <span class="brand-title">Grace Li</span>
      <span class="brand-sub">瀛动教育</span>
    </a>

    <button class="menu-toggle" type="button" data-bs-toggle="collapse" data-bs-target="#mainMenu">☰</button>
    <div class="collapse navbar-collapse" id="mainMenu">
      <ul class="menu-list ms-auto">
        <li><a href="{{ url_for('home') }}">首页</a></li>
        <li><a href="{{ url_for('services') }}">申请服务</a></li>
        <li><a href="{{ url_for('offers') }}">Offer</a></li>
        <li><a href="{{ url_for('study_maps_index') }}">留学地图</a></li>
        <li><a href="{{ url_for('guide') }}">留学知道</a></li>
        <li><a href="{{ url_for('contact_page') }}">联系咨询</a></li>
      </ul>
    </div>

    <div class="nav-actions">
      <span class="bell">🔔</span>
      <span class="avatar"></span>
      <span class="arrow">▾</span>
    </div>
  </div>
</nav>

{% block content %}{% endblock %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<a class='floating-cta' href='{{ url_for('contact_page') }}'>立即咨询</a>


</body>
</html>
